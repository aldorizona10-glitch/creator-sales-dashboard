# Render.com deployment — Rails 8 + SQLite (free tier)
# https://render.com/docs/deploy-rails

databases: []
services:
  - type: web
    name: creator-sales-dashboard
    runtime: ruby
    plan: free
    region: oregon
    buildCommand: "./bin/render-build.sh"
    startCommand: "bin/rails server -p $PORT -e production"
    envVars:
      - key: DATABASE_URL
        value: sqlite:///storage/production.sqlite3
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: PORT
        value: 10000
    healthCheckPath: /up